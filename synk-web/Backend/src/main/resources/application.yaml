spring:
  application:
    name: synk-web

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_LIFESPAN}


security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${CLIENT_ID}
          client-secret: ${CLIENT_SECRET}
          scope:
            - email
            - profile


